<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de Gestión Escolar</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/alumnos.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/reportes.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">

            <i class="bi bi-mortarboard-fill"></i>

            <h2>SchoolSys</h2>

        </div>

        <nav>

            <ul>

                <li data-page="dashboard" class="active">

                    <i class="bi bi-house-door-fill"></i>

                    <span>Inicio</span>

                </li>

                <li data-page="alumnos">

                    <i class="bi bi-person-fill"></i>

                    <span>Alumnos</span>

                </li>

                <li data-page="apoderados">

                    <i class="bi bi-people-fill"></i>

                    <span>Apoderados</span>

                </li>

                <li data-page="matriculas">

                    <i class="bi bi-journal-bookmark-fill"></i>

                    <span>Matrículas</span>

                </li>

                <li data-page="personal">

                    <i class="bi bi-person-workspace"></i>

                    <span>Personal</span>

                </li>

                <li data-page="pagos">

                    <i class="bi bi-cash-stack"></i>

                    <span>Pagos</span>

                </li>

                <li data-page="reportes">

                    <i class="bi bi-bar-chart-fill"></i>

                    <span>Reportes</span>

                </li>

            </ul>

        </nav>

    </aside>

    <!-- CONTENIDO -->

    <main class="main">

        <header class="header">

            <div>

                <h1>Sistema de Gestión Escolar</h1>

                <p>Panel Administrativo</p>

            </div>

            <div class="header-right">

                <button class="notification">

                    <i class="bi bi-bell-fill"></i>

                </button>

                <div class="user">

                    <i class="bi bi-person-circle"></i>

                    <span>Administrador</span>

                </div>

            </div>

        </header>

        <!-- AQUÍ CAMBIARÁN LOS MÓDULOS -->

        <div id="contenido"></div>

    </main>

    <script src="modules/alumnos.js"></script>
    <script src="modules/apoderados.js"></script>
    <script src="modules/matriculas.js"></script>
    <script src="modules/personal.js"></script>
    <script src="modules/pagos.js"></script>
    <script src="modules/dashboard.js"></script>
    <script src="modules/reportes.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
