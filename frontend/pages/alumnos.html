<div class="page">

    <!-- ENCABEZADO -->

    <section class="page-header">

        <div>

            <h2>Gestión de Alumnos</h2>

            <p>Registro, consulta y administración de alumnos.</p>

        </div>

        <button class="btn btn-primary" id="btnNuevoAlumno">

            <i class="bi bi-person-plus-fill"></i>

            Nuevo Alumno

        </button>

    </section>

    <!-- BUSCADOR -->

    <section class="toolbar">

        <div class="search-box">

            <i class="bi bi-search"></i>

            <input
                type="text"
                id="buscarAlumno"
                placeholder="Buscar por ID, nombre o apellido">

        </div>

    </section>

    <!-- TABLA -->

    <section class="table-container">

        <table id="tablaAlumnos" class="tabla-alumnos">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Nacimiento</th>
                    <th>Edad</th>
                    <th>Nivel</th>
                    <th>Apoderado</th>
                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </section>

</div>

<!--=========================
        MODAL
==========================-->

<div class="modal" id="modalAlumno">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="tituloModal">

                Registrar Alumno

            </h2>

            <button
                class="btn-close"
                id="cerrarModal">

                <i class="bi bi-x-lg"></i>

            </button>

        </div>

        <form id="formAlumno">

            <div class="form-grid">

                <div class="form-group">

                    <label>ID Alumno</label>

                    <input
                        type="number"
                        id="idAlumno"
                        required>

                </div>

                <div class="form-group">

                    <label>ID Apoderado</label>

                    <input
                        type="number"
                        id="idApoderado"
                        required>

                </div>

            </div>

            <div class="form-group">

                <label>Nombre</label>

                <input
                    type="text"
                    id="nombre"
                    required>

            </div>

            <div class="form-group">

                <label>Apellido</label>

                <input
                    type="text"
                    id="apellido"
                    required>

            </div>

            <div class="form-grid">

                <div class="form-group">

                    <label>Fecha de nacimiento</label>

                    <input
                        type="date"
                        id="fechaNacimiento"
                        required>

                </div>

                <div class="form-group">

                    <label>Nivel</label>

                    <select id="nivel">

                        <option value="INICIAL">Inicial</option>

                        <option value="PRIMARIA">Primaria</option>

                        <option value="SECUNDARIA">Secundaria</option>

                    </select>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    id="btnCancelar">

                    Cancelar

                </button>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Guardar Alumno

                </button>

            </div>

        </form>

    </div>

</div>

<!--=========================
      NOTIFICACIONES
==========================-->

<div id="toast" class="toast">

    <i class="bi bi-check-circle-fill"></i>

    <span id="toastMensaje">

    </span>

</div>
