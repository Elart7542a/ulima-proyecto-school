<div class="page">

    <!-- ENCABEZADO -->

    <section class="page-header">

        <div>

            <h2>Gestión de Apoderados</h2>

            <p>Registro, consulta y administración de apoderados.</p>

        </div>

        <button class="btn btn-primary" id="btnNuevoApoderado">

            <i class="bi bi-person-plus-fill"></i>

            Nuevo Apoderado

        </button>

    </section>

    <!-- BUSCADOR -->

    <section class="toolbar">

        <div class="search-box">

            <i class="bi bi-search"></i>

            <input
                type="text"
                id="buscarApoderado"
                placeholder="Buscar por ID, nombre o apellido">

        </div>

    </section>

    <!-- TABLA -->

    <section class="table-container">

        <table id="tablaApoderados" class="tabla-alumnos">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </section>

</div>

<!--=========================
        MODAL
==========================-->

<div class="modal" id="modalApoderado">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="tituloModalApoderado">

                Registrar Apoderado

            </h2>

            <button
                class="btn-close"
                id="cerrarModal">

                <i class="bi bi-x-lg"></i>

            </button>

        </div>

        <form id="formApoderado">

            <div class="form-group">

                <label>ID Apoderado</label>

                <input
                    type="number"
                    id="idApoderado"
                    required>

            </div>

            <div class="form-group">

                <label>Nombre</label>

                <input
                    type="text"
                    id="nombre"
                    required>

            </div>

            <div class="form-group">

                <label>Apellido</label>

                <input
                    type="text"
                    id="apellido"
                    required>

            </div>

            <div class="form-group">

                <label>Teléfono</label>

                <input
                    type="text"
                    id="telefono"
                    required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    required>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    id="btnCancelar">

                    Cancelar

                </button>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Guardar Apoderado

                </button>

            </div>

        </form>

    </div>

</div>

<!--=========================
      NOTIFICACIONES
==========================-->

<div id="toast" class="toast">

    <i class="bi bi-check-circle-fill"></i>

    <span id="toastMensaje">

    </span>

</div>
