<div class="page">

    <section class="page-header">

        <div>

            <h2>Gestión de Matrículas</h2>

            <p>Registro y administración de matrículas.</p>

        </div>

        <button class="btn btn-primary" id="btnNuevaMatricula">

            <i class="bi bi-journal-plus"></i>

            Nueva Matrícula

        </button>

    </section>

    <section class="toolbar">

        <div class="search-box">

            <i class="bi bi-search"></i>

            <input
                type="text"
                id="buscarMatricula"
                placeholder="Buscar por ID de matrícula o alumno">

        </div>

    </section>

    <section class="table-container">

        <table id="tablaMatriculas" class="tabla-alumnos">

            <thead>

                <tr>

                    <th>ID Matrícula</th>
                    <th>ID Alumno</th>
                    <th>ID Salón</th>
                    <th>Año Escolar</th>
                    <th>Fecha</th>
                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </section>

</div>

<div class="modal" id="modalMatricula">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="tituloModalMatricula">

                Registrar Matrícula

            </h2>

            <button class="btn-close" id="cerrarModalMatricula">

                <i class="bi bi-x-lg"></i>

            </button>

        </div>

        <form id="formMatricula">

            <div class="form-group">

                <label>ID Matrícula</label>

                <input
                    type="number"
                    id="idMatricula"
                    required>

            </div>

            <div class="form-group">

                <label>ID Alumno</label>

                <input
                    type="number"
                    id="idAlumno"
                    required>

            </div>

            <div class="form-group">

                <label>ID Salón</label>

                <input
                    type="number"
                    id="idSalon"
                    required>

            </div>

            <div class="form-group">

                <label>ID Año Escolar</label>

                <input
                    type="number"
                    id="idAnioEscolar"
                    required>

            </div>

            <div class="form-group">

                <label>Fecha de Matrícula</label>

                <input
                    type="date"
                    id="fechaMatricula"
                    required>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    id="btnCancelarMatricula">

                    Cancelar

                </button>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Guardar Matrícula

                </button>

            </div>

        </form>

    </div>

</div>

<div id="toast" class="toast">

    <i class="bi bi-check-circle-fill"></i>

    <span id="toastMensaje"></span>

</div>
