<div class="page">

    <!-- ENCABEZADO -->

    <section class="page-header">

        <div>

            <h2>Reportes del Sistema</h2>

            <p>Consulta y análisis de la información registrada.</p>

        </div>

    </section>

    <!-- OPCIONES DE REPORTES -->

    <section class="reportes-grid">

        <button
            type="button"
            class="reporte-card active"
            data-reporte="matriculas">

            <i class="bi bi-journal-check"></i>

            <div>

                <h3>Alumnos matriculados</h3>

                <p>Consulta alumnos, salones y años escolares.</p>

            </div>

        </button>

        <button
            type="button"
            class="reporte-card"
            data-reporte="pagos">

            <i class="bi bi-cash-coin"></i>

            <div>

                <h3>Pagos realizados</h3>

                <p>Consulta los recibos registrados.</p>

            </div>

        </button>

        <button
            type="button"
            class="reporte-card"
            data-reporte="personal">

            <i class="bi bi-person-badge"></i>

            <div>

                <h3>Personal registrado</h3>

                <p>Consulta trabajadores, cargos y salones.</p>

            </div>

        </button>

        <button
            type="button"
            class="reporte-card"
            data-reporte="estadisticas">

            <i class="bi bi-bar-chart-fill"></i>

            <div>

                <h3>Estadísticas</h3>

                <p>Resumen general de los registros.</p>

            </div>

        </button>

    </section>

    <!-- ENCABEZADO DEL REPORTE -->

    <section class="reporte-contenido">

        <div class="reporte-header">

            <div>

                <h3 id="tituloReporte">
                    Alumnos matriculados
                </h3>

                <p id="descripcionReporte">
                    Relación de alumnos registrados en una matrícula.
                </p>

            </div>

            <div class="reporte-acciones">

                <button
                    type="button"
                    class="btn btn-secondary"
                    id="btnImprimirReporte">

                    <i class="bi bi-printer-fill"></i>

                    Imprimir

                </button>

            </div>

        </div>

        <!-- BUSCADOR -->

        <div class="toolbar">

            <div class="search-box">

                <i class="bi bi-search"></i>

                <input
                    type="text"
                    id="buscarReporte"
                    placeholder="Buscar en el reporte"
                    autocomplete="off">

            </div>

        </div>

        <!-- TABLA DEL REPORTE -->

        <div class="table-container">

            <table
                id="tablaReporte"
                class="tabla-alumnos">

                <thead id="encabezadoReporte">

                    <tr>

                        <th>ID Matrícula</th>
                        <th>Alumno</th>
                        <th>Salón</th>
                        <th>Año Escolar</th>
                        <th>Fecha</th>

                    </tr>

                </thead>

                <tbody id="cuerpoReporte">

                    <tr>

                        <td
                            colspan="5"
                            style="text-align:center">

                            Cargando reporte...

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </section>

</div>
